ai.upload.title= Upload your passport photo and a control selfie for AI authentication

ai.processing.title= Launching AI KYC module...
ai.processing.desc=Calculating biometric facial features and comparing embeddings via Cosine Similarity...

ai.error.title=Document Upload Error
ai.error.desc=To pass AI authentication, you must provide strictly 2 files (Step 1): first ? your passport photo, second ? your control selfie.

ai.success.title=Biometric verification successfully passed!
ai.success.verdict=AI Verdict: Identity Confirmed
ai.success.desc=Convolutional Neural Network (CNN) confirmed the full authenticity of the face on the selfie with the photo in the provided document. Spring Security context and role updated to Help Seeker.

ai.failed.title=AI Verification Rejected!
ai.failed.desc=Cosine similarity is below the set sensitivity threshold (0.58). FaceNet neural network determined that there are absolutely different people in the uploaded photos. Please try again with your document.

ai.down.title=AI Service Temporarily Unavailable
ai.down.desc=The neural network authentication module is currently undergoing technical maintenance. Autonomous bypass is blocked for security reasons. Please try to pass verification later.

